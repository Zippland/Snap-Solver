<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f4f0e8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#161310" media="(prefers-color-scheme: dark)">
    <title>Snap Solver</title>
    <link rel="icon" href="/static/favicon.ico">
    <script>
        // 首绘前应用主题，避免闪烁：light | dark | 缺省=跟随系统
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
        window.onerror = function (message, source, lineno, colno, error) {
            console.error('Error caught: ', message, 'at', source, ':', lineno, ':', colno, error);
            return false;
        };
    </script>
    <link rel="stylesheet" href="/static/css/tokens.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/views.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.8.0/highlight.min.js"></script>
</head>
<!-- data-view 状态机：empty | workspace | answer -->
<body class="app-container" data-view="empty">
    <!-- ============ 顶行：连接状态 + 设置 ============ -->
    <div class="app-topbar">
        <span class="chip" id="connectionStatus">
            <span class="chip-dot"></span>
            <span id="connectionText">未连接</span>
        </span>
        <button class="btn btn-icon" id="settingsToggle" title="设置" aria-label="设置"><i class="fas fa-gear"></i></button>
    </div>

    <!-- 更新提示条 -->
    <div class="update-banner hidden" id="updateBanner">
        <i class="fas fa-circle-up"></i>
        <span><span id="updateBannerText">发现新版本</span> · <a href="#" id="updateBannerLink" target="_blank">查看发布页</a></span>
        <button class="update-banner-close" id="updateBannerClose" aria-label="关闭"><i class="fas fa-xmark"></i></button>
    </div>

    <!-- ============ 视图 1：空态（聚焦式） ============ -->
    <main class="view view-empty" id="emptyState">
        <div class="empty-center">
            <button class="capture-orb" id="captureBtn" disabled>
                <i class="fas fa-camera"></i>
                <span id="captureBtnLabel">截屏解题</span>
            </button>
            <p class="empty-desc" id="emptyDesc">将截取电脑的整个屏幕
回传后在手机上框选题目</p>
        </div>
        <!-- 模型入口卡：一等公民 -->
        <button class="model-entry" id="modelEntry">
            <span class="provider-logo" id="modelEntryLogo">?</span>
            <span class="model-entry-info">
                <span class="model-entry-name" id="modelEntryName">选择模型</span>
                <span class="model-entry-sub" id="modelEntrySub">未选择模型</span>
            </span>
            <i class="fas fa-chevron-right"></i>
        </button>
        <!-- 开源页脚 -->
        <a class="repo-footer" href="https://github.com/Zippland/Snap-Solver" target="_blank">
            <i class="fa-brands fa-github"></i>
            <span>开源项目 · <span class="repo-name">Zippland/Snap-Solver</span></span>
        </a>
    </main>

    <!-- ============ 视图 2：解答屏 ============ -->
    <main class="view view-answer" id="answerView">
        <div class="answer-topbar">
            <button class="btn btn-icon plain" id="answerBack" aria-label="返回"><i class="fas fa-arrow-left"></i></button>
            <div class="status-cluster" id="statusCluster">
                <span class="status-dot"></span>
                <i class="fas fa-circle-check status-check"></i>
                <span class="status-text" id="statusText">准备中</span>
                <span class="status-meta" id="statusMeta"></span>
            </div>
            <button class="btn-stop" id="stopGenerationBtn" aria-label="停止生成"><i class="fas fa-stop"></i></button>
        </div>

        <!-- 题目缩略条 -->
        <button class="question-strip" id="questionThumb">
            <img id="questionThumbImg" alt="题目" />
            <span class="question-strip-meta" id="questionMeta"></span>
            <i class="fas fa-magnifying-glass-plus"></i>
        </button>

        <div class="answer-scroll" id="answerScroll">
            <!-- 思考过程：不显眼小字，思考中展开流式打出，结束自动收起为一行 -->
            <div class="fu-thinking" id="thinkingBlock" data-state="hidden">
                <div class="fu-thinking-head" id="thinkingHead">
                    <i class="fas fa-wand-magic-sparkles"></i>
                    <span class="fu-think-label" id="thinkingLabel">思考中</span>
                    <span class="fu-think-meta" id="thinkingMeta"></span>
                    <i class="fas fa-chevron-down fu-think-toggle"></i>
                </div>
                <div class="fu-thinking-full" id="thinkingFull"></div>
            </div>
            <div class="answer-label hidden" id="answerLabel">最终答案</div>
            <div class="response-content" id="responseContent"></div>
            <!-- 完成后的动作行（随内容流，设计 4a） -->
            <div class="answer-actions" id="answerActions">
                <button class="action-chip" id="resolveBtn"><i class="fas fa-rotate-right"></i><span>重解</span></button>
                <button class="action-chip" id="switchModelBtn"><i class="fas fa-shuffle"></i><span>换模型重解</span></button>
                <button class="action-chip" id="copyAnswerBtn"><i class="fa-regular fa-copy"></i><span>复制</span></button>
            </div>
            <!-- 同题追问：问答链（设计 4b） -->
            <div class="followup-thread" id="followupThread"></div>
        </div>

        <button class="jump-latest hidden" id="jumpLatest"><i class="fas fa-arrow-down"></i> 跟随最新</button>

        <!-- 同题追问输入条：仅完成态出现（设计 4a/4b） -->
        <div class="followup-bar hidden" id="followupBar">
            <div class="followup-hint" id="followupHint">追问仅围绕本题 · 返回或换题后清空</div>
            <div class="followup-input-row">
                <input type="text" id="followupInput" placeholder="答案没看懂？就这道题继续问…" autocomplete="off" enterkeyhint="send" />
                <button class="followup-send" id="followupSend" aria-label="发送追问"><i class="fas fa-arrow-up"></i></button>
            </div>
        </div>
    </main>

    <!-- ============ 视图 3：框选工作台 ============ -->
    <div class="view view-workspace" id="workspace">
        <div class="workspace-stage">
            <div class="crop-area"></div>
            <button class="workspace-exit" id="workspaceExit"><i class="fas fa-xmark"></i> 退出</button>
            <div class="workspace-hint">电脑整屏截图<br>双指缩放查看</div>
            <div class="crop-size-readout hidden" id="cropSizeReadout"></div>
        </div>
        <div class="workspace-toolbar">
            <button class="btn-square" id="cropReset"><i class="fas fa-arrows-rotate"></i><span>重置框</span></button>
            <button class="btn-square" id="reshootBtn"><i class="fas fa-camera-rotate"></i><span>重截</span></button>
            <button class="btn btn-primary" id="cropSendToAI"><i class="fas fa-paper-plane"></i> 发送解题</button>
        </div>
    </div>

    <!-- ============ 模型选择页（厂商 Tab + 当前模型 + 全部模型 + 密钥随状态） ============ -->
    <div class="model-page" id="modelPage">
        <div class="model-page-topbar">
            <button class="btn btn-icon plain" id="modelPageBack" aria-label="返回"><i class="fas fa-arrow-left"></i></button>
            <span class="model-page-title">选择模型</span>
            <span class="model-page-hint">选择即生效</span>
        </div>
        <div class="provider-tabs" id="providerTabs"></div>
        <div class="model-page-scroll" id="modelPageScroll"></div>
    </div>

    <!-- ============ 设置页（两级菜单：主页导航 + 二级页） ============ -->
    <div class="model-page settings-page" id="settingsPage">
        <div class="model-page-topbar">
            <button class="btn btn-icon plain" id="settingsBack" aria-label="返回"><i class="fas fa-arrow-left"></i></button>
            <span class="model-page-title" id="settingsTitle">设置</span>
            <span class="model-page-hint" id="settingsRight"></span>
        </div>
        <div class="model-page-scroll" id="settingsScroll"></div>
    </div>

    <!-- ============ 题目全屏对照层 ============ -->
    <div class="lightbox hidden" id="lightbox">
        <button class="btn btn-icon lightbox-close" id="lightboxClose" aria-label="关闭"><i class="fas fa-xmark"></i></button>
        <img id="lightboxImg" alt="题目全屏" />
    </div>

    <!-- ============ 唯一弹层宿主（Sheets 管理器动态挂载） ============ -->
    <div id="sheetRoot"></div>

    <!-- 提示词编辑表单模板（Sheets 克隆使用） -->
    <template id="tplPromptEditor">
        <h3 class="confirm-title" data-role="title">编辑提示词</h3>
        <div class="form-field">
            <label>ID（英文标识）</label>
            <input type="text" data-role="id" placeholder="如 physics" />
        </div>
        <div class="form-field">
            <label>名称</label>
            <input type="text" data-role="name" placeholder="如 物理大题" />
        </div>
        <div class="form-field">
            <label>简介</label>
            <input type="text" data-role="desc" placeholder="一句话说明" />
        </div>
        <div class="form-field">
            <label>提示词内容</label>
            <textarea data-role="content" placeholder="系统提示词内容"></textarea>
        </div>
        <div class="form-actions">
            <button class="btn btn-ghost" data-role="cancel">取消</button>
            <button class="btn btn-primary" data-role="save">保存</button>
        </div>
    </template>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        window.SERVER_DATA = {
            localIp: "{{ local_ip }}",
            updateInfo: {{ update_info | tojson | safe }}
        };
    </script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/model-page.js"></script>
    <script src="/static/js/settings-page.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
